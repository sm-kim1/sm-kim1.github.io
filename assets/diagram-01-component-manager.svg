<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Runtime Component Manager with Dynamic Device Pool" font-family="IBM Plex Sans, system-ui, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4D7C7D"></path>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FAFAF7"></rect>

  
  <g>
    <rect x="320" y="70" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="430" y="124" fill="#1A1A1A" font-size="30" text-anchor="middle" font-weight="500">Device A</text>

    <rect x="570" y="70" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="680" y="124" fill="#1A1A1A" font-size="30" text-anchor="middle" font-weight="500">Device B</text>

    <rect x="820" y="70" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="930" y="124" fill="#1A1A1A" font-size="30" text-anchor="middle" font-weight="500">Device C</text>

    <rect x="1070" y="70" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="1180" y="124" fill="#1A1A1A" font-size="30" text-anchor="middle" font-weight="500">Device N</text>
  </g>

  
  <path d="M 800 175 L 800 235" stroke="#4D7C7D" stroke-width="2.5" fill="none" marker-end="url(#ah)"></path>

  
  <rect x="80" y="245" width="1440" height="440" rx="5" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2.5"></rect>
  <text x="800" y="305" fill="#1A1A1A" font-size="40" font-weight="500" letter-spacing="-0.5" text-anchor="middle">Runtime Component Manager</text>

  
  <text x="800" y="365" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="22" letter-spacing="4" text-anchor="middle" font-weight="600">DYNAMIC DEVICE POOL</text>

  
  <g>
    
    <rect x="130" y="400" width="260" height="130" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <circle cx="160" cy="430" r="8" fill="#4D7C7D"></circle>
    <text x="180" y="438" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="20" letter-spacing="2" font-weight="600">SLOT 01</text>
    <text x="260" y="490" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">Device A</text>

    
    <rect x="410" y="400" width="260" height="130" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <circle cx="440" cy="430" r="8" fill="#4D7C7D"></circle>
    <text x="460" y="438" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="20" letter-spacing="2" font-weight="600">SLOT 02</text>
    <text x="540" y="490" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">Device B</text>

    
    <rect x="690" y="400" width="260" height="130" rx="4" fill="#FFFFFF" stroke="#C97A5C" stroke-width="2" stroke-dasharray="6 5"></rect>
    <circle cx="720" cy="430" r="8" fill="#C97A5C"></circle>
    <text x="740" y="438" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="20" letter-spacing="2" font-weight="600">SLOT 03</text>
    <text x="820" y="490" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">Device C</text>

    
    <rect x="970" y="400" width="260" height="130" rx="4" fill="#FAFAF7" stroke="#C5C2B8" stroke-width="2" stroke-dasharray="4 5"></rect>
    <circle cx="1000" cy="430" r="8" fill="none" stroke="#9A988F" stroke-width="2"></circle>
    <text x="1020" y="438" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#9A988F" font-size="20" letter-spacing="2" font-weight="600">SLOT 04</text>
    <text x="1100" y="490" fill="#9A988F" font-size="22" text-anchor="middle">— free —</text>

    
    <rect x="1250" y="400" width="240" height="130" rx="4" fill="#FAFAF7" stroke="#C5C2B8" stroke-width="2" stroke-dasharray="4 5"></rect>
    <circle cx="1280" cy="430" r="8" fill="none" stroke="#9A988F" stroke-width="2"></circle>
    <text x="1300" y="438" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#9A988F" font-size="20" letter-spacing="2" font-weight="600">SLOT N</text>
    <text x="1370" y="490" fill="#9A988F" font-size="22" text-anchor="middle">— free —</text>
  </g>

  
  <line x1="130" y1="575" x2="1490" y2="575" stroke="#E5E2D8" stroke-dasharray="4 6"></line>

  
  <g>
    <text x="270" y="635" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600" text-anchor="middle">REGISTRATION</text>
    <text x="610" y="635" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600" text-anchor="middle">LIFECYCLE</text>
    <text x="950" y="635" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600" text-anchor="middle">INTERFACE CACHE</text>
    <text x="1290" y="635" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600" text-anchor="middle">RECOVERY</text>
  </g>

  
  <path d="M 800 695 L 800 760" stroke="#4D7C7D" stroke-width="2.5" fill="none" marker-end="url(#ah)"></path>

  
  <rect x="440" y="770" width="720" height="100" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
  <text x="800" y="833" fill="#1A1A1A" font-size="32" text-anchor="middle" font-weight="500">ROS2 Middleware Module</text>
</svg>