<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="ROS2 Multi-domain Template — isolated communication domains" font-family="IBM Plex Sans, system-ui, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4D7C7D"></path>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9A988F"></path>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FAFAF7"></rect>

  
  <text x="800" y="100" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="22" letter-spacing="4" text-anchor="middle" font-weight="600">ROS2 SYSTEM · MULTI-DOMAIN TEMPLATE</text>

  
  <rect x="80" y="140" width="1440" height="640" rx="6" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2.5"></rect>

  
  <g>
    <rect x="130" y="200" width="640" height="260" rx="5" fill="#FAFAF7" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="160" y="245" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600">DOMAIN 01</text>
    <text x="730" y="245" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="18" letter-spacing="2" text-anchor="end" font-weight="500">DOMAIN_ID = 10</text>
    <line x1="160" y1="265" x2="740" y2="265" stroke="#E5E2D8"></line>

    
    <rect x="180" y="320" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="260" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /a</text>

    <rect x="395" y="320" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="475" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /b</text>

    <rect x="610" y="320" width="130" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="675" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /c</text>

    
    <path d="M 340 360 L 395 360" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>
    <path d="M 555 360 L 610 360" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>

    <text x="160" y="430" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#6B6960" font-size="16">/topic_perception</text>
  </g>

  
  <g>
    <rect x="830" y="200" width="640" height="260" rx="5" fill="#FAFAF7" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="860" y="245" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600">DOMAIN 02</text>
    <text x="1430" y="245" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="18" letter-spacing="2" text-anchor="end" font-weight="500">DOMAIN_ID = 20</text>
    <line x1="860" y1="265" x2="1440" y2="265" stroke="#E5E2D8"></line>

    <rect x="880" y="320" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="960" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /a</text>

    <rect x="1095" y="320" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="1175" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /b</text>

    <rect x="1310" y="320" width="130" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="1375" y="370" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /c</text>

    <path d="M 1040 360 L 1095 360" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>
    <path d="M 1255 360 L 1310 360" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>

    <text x="860" y="430" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#6B6960" font-size="16">/topic_control</text>
  </g>

  
  <g>
    <rect x="130" y="490" width="640" height="260" rx="5" fill="#FAFAF7" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="160" y="535" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#1A1A1A" font-size="22" letter-spacing="3" font-weight="600">DOMAIN 03</text>
    <text x="730" y="535" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="18" letter-spacing="2" text-anchor="end" font-weight="500">DOMAIN_ID = 30</text>
    <line x1="160" y1="555" x2="740" y2="555" stroke="#E5E2D8"></line>

    <rect x="180" y="610" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="260" y="660" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /a</text>

    <rect x="395" y="610" width="160" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="475" y="660" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /b</text>

    <rect x="610" y="610" width="130" height="80" rx="4" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
    <text x="675" y="660" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">node /c</text>

    <path d="M 340 650 L 395 650" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>
    <path d="M 555 650 L 610 650" stroke="#9A988F" stroke-width="2" fill="none" marker-end="url(#ahg)"></path>

    <text x="160" y="720" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#6B6960" font-size="16">/topic_mission</text>
  </g>

  
  <g>
    <rect x="830" y="490" width="640" height="260" rx="5" fill="#FAFAF7" stroke="#C5C2B8" stroke-width="2" stroke-dasharray="6 5"></rect>
    <text x="860" y="535" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#9A988F" font-size="22" letter-spacing="3" font-weight="600">DOMAIN N</text>
    <text x="1430" y="535" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#9A988F" font-size="18" letter-spacing="2" text-anchor="end" font-weight="500">DOMAIN_ID = …</text>
    <line x1="860" y1="555" x2="1440" y2="555" stroke="#E5E2D8"></line>
    <text x="1150" y="660" fill="#9A988F" font-size="24" text-anchor="middle">— scalable per template —</text>
  </g>

  
  <text x="800" y="478" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#C97A5C" font-size="14" letter-spacing="3" text-anchor="middle" font-weight="600">ISOLATED · NO CROSS-DOMAIN TRAFFIC</text>

  
  <text x="800" y="840" fill="#1A1A1A" font-size="22" text-anchor="middle" font-weight="500">Each domain operates in an isolated communication scope · standardized template per domain.</text>
</svg>