<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Autonomous vehicle data collection — snapshot and recording duration modes" font-family="IBM Plex Sans, system-ui, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4D7C7D"></path>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FAFAF7"></rect>

  
  <g>
    <rect x="380" y="60" width="240" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="500" y="113" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">Sensor</text>

    <rect x="680" y="60" width="240" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="800" y="113" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">CAN</text>

    <rect x="980" y="60" width="240" height="90" rx="4" fill="#FFFFFF" stroke="#E5E2D8" stroke-width="2"></rect>
    <text x="1100" y="113" fill="#1A1A1A" font-size="26" text-anchor="middle" font-weight="500">ROS Topics</text>
  </g>

  
  <path d="M 800 165 L 800 235" stroke="#4D7C7D" stroke-width="2.5" fill="none" marker-end="url(#ah)"></path>

  
  <rect x="380" y="245" width="840" height="120" rx="5" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2.5"></rect>
  <text x="800" y="320" fill="#1A1A1A" font-size="36" font-weight="500" letter-spacing="-0.5" text-anchor="middle">Data Collection Pipeline</text>

  
  <path d="M 540 380 L 420 470" stroke="#4D7C7D" stroke-width="2.5" fill="none" marker-end="url(#ah)"></path>
  <path d="M 1060 380 L 1180 470" stroke="#4D7C7D" stroke-width="2.5" fill="none" marker-end="url(#ah)"></path>

  
  <rect x="80" y="480" width="680" height="360" rx="5" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
  <text x="110" y="540" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="22" letter-spacing="4" font-weight="600">MODE A</text>
  <text x="110" y="600" fill="#1A1A1A" font-size="38" font-weight="500" letter-spacing="-0.5">Snapshot Logging</text>
  <text x="110" y="640" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#6B6960" font-size="18">event-triggered window</text>

  
  <line x1="110" y1="760" x2="730" y2="760" stroke="#9A988F" stroke-width="2"></line>
  
  <g stroke="#9A988F" stroke-width="1.5">
    <line x1="160" y1="755" x2="160" y2="765"></line>
    <line x1="260" y1="755" x2="260" y2="765"></line>
    <line x1="360" y1="755" x2="360" y2="765"></line>
    <line x1="460" y1="755" x2="460" y2="765"></line>
    <line x1="560" y1="755" x2="560" y2="765"></line>
    <line x1="660" y1="755" x2="660" y2="765"></line>
  </g>
  
  <rect x="360" y="730" width="200" height="60" rx="3" fill="#4D7C7D" fill-opacity="0.18" stroke="#4D7C7D" stroke-width="2"></rect>
  
  <line x1="460" y1="700" x2="460" y2="800" stroke="#C97A5C" stroke-width="2.5"></line>
  <circle cx="460" cy="700" r="8" fill="#C97A5C"></circle>
  <text x="460" y="685" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#C97A5C" font-size="16" letter-spacing="2" text-anchor="middle" font-weight="600">EVENT</text>
  <text x="460" y="820" fill="#2F5959" font-size="16" text-anchor="middle" font-weight="500">captured slice</text>

  
  <rect x="840" y="480" width="680" height="360" rx="5" fill="#FFFFFF" stroke="#4D7C7D" stroke-width="2"></rect>
  <text x="870" y="540" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="22" letter-spacing="4" font-weight="600">MODE B</text>
  <text x="870" y="600" fill="#1A1A1A" font-size="38" font-weight="500" letter-spacing="-0.5">Recording Duration</text>
  <text x="870" y="640" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#6B6960" font-size="18">user-defined time window</text>

  
  <line x1="870" y1="760" x2="1490" y2="760" stroke="#9A988F" stroke-width="2"></line>
  <g stroke="#9A988F" stroke-width="1.5">
    <line x1="920" y1="755" x2="920" y2="765"></line>
    <line x1="1020" y1="755" x2="1020" y2="765"></line>
    <line x1="1120" y1="755" x2="1120" y2="765"></line>
    <line x1="1220" y1="755" x2="1220" y2="765"></line>
    <line x1="1320" y1="755" x2="1320" y2="765"></line>
    <line x1="1420" y1="755" x2="1420" y2="765"></line>
  </g>
  
  <rect x="970" y="730" width="400" height="60" rx="3" fill="#4D7C7D" fill-opacity="0.18" stroke="#4D7C7D" stroke-width="2"></rect>
  
  <line x1="970" y1="700" x2="970" y2="800" stroke="#4D7C7D" stroke-width="2.5"></line>
  <line x1="1370" y1="700" x2="1370" y2="800" stroke="#4D7C7D" stroke-width="2.5"></line>
  <text x="970" y="685" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="16" letter-spacing="2" text-anchor="middle" font-weight="600">START</text>
  <text x="1370" y="685" font-family="IBM Plex Mono, ui-monospace, Menlo, monospace" fill="#2F5959" font-size="16" letter-spacing="2" text-anchor="middle" font-weight="600">END</text>
  <text x="1170" y="820" fill="#2F5959" font-size="16" text-anchor="middle" font-weight="500">continuous logging</text>
</svg>